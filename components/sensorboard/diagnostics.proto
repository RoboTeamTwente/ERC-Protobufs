syntax = "proto3";

import "components/common/sensor.proto";
import "components/sensorboard/ph_sensor.proto";
import "components/sensorboard/imu_sensor.proto";
import "components/sensorboard/gps_sensor.proto";

message SensorBoardDiagnostics {
  enum State {
    IDLE = 0;
    OPERATING = 1;
    CALIBRATING = 2;
    ERROR = 3;
  }

  State state = 1;
  PHSensorInformation ph_sensor = 2;
  IMUSensorInformation imu_sensor = 3;

  // Overall sensor board health
  float board_temperature = 4;
  float board_voltage = 5;
  
  GPSSensorInformation gps_sensor_1 = 6;
}
