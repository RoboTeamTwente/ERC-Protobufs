syntax = "proto3";

import "motor.proto";

message DrivingBoardDiagnostics {
  enum State {
      IDLE = 0;
      OPERATING = 1;
      CALIBRATING = 2;
      ERROR = 3;
      }

  State state = 1;
    MotorInformation front_left_motor = 2;
    MotorInformation middle_left_motor = 3;
    MotorInformation back_left_motor = 4;
    MotorInformation front_right_motor = 5;
    MotorInformation middle_right_motor = 6;
    MotorInformation back_right_motor = 7;
    MotorInformation steering_front_left_motor = 8;
    MotorInformation steering_back_left_motor = 9;
    MotorInformation steering_front_right_motor = 10;
    MotorInformation steering_back_right_motor = 11; //NOTE: Yeah this is a lot, I get what is going on but there are ways of making it at least better
                                                           // For example, either have a repeated field (with specified size) or by giving them more descriptive names (front_left_motor, front_right_motor, etc)
}
