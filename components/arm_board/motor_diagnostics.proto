syntax = "proto3";

import "components/common/motor.proto";

//Message Out: Arm board -> Debug, SUPER diagnostics message with all feedback/diagnostics included
message ArmBoardDiagnostics {
    enum State {
        IDLE = 0;
        OPERATING = 1;
        CALIBRATING = 2; //Arm not available to move while calibrating
        ERROR = 3;
    }
    MotorInformation gripper_rotation_motor = 1; //side-to-side rotation of wrist
    MotorInformation gripper_pitch_motor = 2; //up and down rotation of wrist
    MotorInformation base_motor = 3;
    MotorInformation top_motor = 4; //top shoulder
    MotorInformation bottom_motor = 5; //bottom shoulder
    MotorInformation jaw_motor = 6; //opens and closes the gripper
    State state = 7;
}   
