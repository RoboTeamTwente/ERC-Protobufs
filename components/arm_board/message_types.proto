syntax = "proto3";

// Arm Board Message Type Definitions (0x01XX range)
enum ArmBoardMessageType {
  MSG_ARM_CONTROL_SIGNALS = 0x0100;
  MSG_ARM_TARGET_MOVEMENT = 0x0101;
  MSG_ARM_OBSTRUCTIONS = 0x0102;
  MSG_ARM_MOVEMENT_FEEDBACK = 0x0103;
  MSG_ARM_ACTUAL_POSITIONS = 0x0104;
  MSG_ARM_MOTOR_DIAGNOSTICS = 0x0105;
  MSG_ARM_DIAGNOSTICS = 0x0106;
}
