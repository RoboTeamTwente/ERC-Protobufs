syntax = "proto3";

//Message In: Software -> Control, Place to move to
//Target is the point of the TIP of the GRIPPER
message TargetMovement {
    //(x,y,z) coordinates for moving
    float target_x = 1;
    float target_y = 2;
    float target_z = 3;
    //Rotation (NOT a quarternion)
    float rotation_angle = 4;
    //Jaw position, degree of "openness" is calculated by control(?)
    bool open_jaw = 5;
}

//Placeholder
message Obstructions {
    float obstructions_list = 1; //lists? //Maybe we will hardcode them (probably not)
}

