syntax = "proto3";

//Message Out: Control -> Embedded, control signals
    //ENA: 
    //Initiates a step each time the ENA port voltage rises above the Enable threshold
    //REV:
    //If the voltage at the REV port is <= Reverse threshold voltage, the pulse is 90° ahead of the pulse.
    //If the REV port voltage is > Reverse threshold voltage, the pulse will precede the pulse by 90° 
    //and the motor rotation direction will be reversed.
message ControlSignals {
    //allegedly these will be in volts, but we will know once the controllers have been chosen
    float control_gripper_rotation = 1;         
    float control_gripper_pitch = 2;          
    float control_base = 3;    
    float control_jaw = 4;            
    bool stepper_top_ena = 5;         
    bool stepper_top_rev = 6;     
    bool stepper_bottom_ena = 7;           
    bool stepper_bottom_rev = 8;             
}