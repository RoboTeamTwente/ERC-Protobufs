syntax = "proto3";

import "components/sensor_board/sensor.proto";
import "components/sensor_board/ph_sensor.proto";
import "components/sensor_board/imu_sensor.proto";
import "components/sensor_board/gps_sensor.proto";

message SensorDiagnostics {
  enum State {
    IDLE = 0;
    OPERATING = 1;
    CALIBRATING = 2;
    ERROR = 3;
  }

  State state = 1;
  SensorBoardPHInfo ph_sensor = 2;
  SensorBoardIMUInfo imu_sensor = 3;

  // Overall sensor board health
  float board_temperature = 4;
  float board_voltage = 5;
  
  SensorBoardGPSInfo gps_sensor_1 = 6;
}
