syntax = "proto3";

import "components/sensor_board/sensor.proto";

// FM-PS2216 Water Flow Sensor message definition
message SensorBoardFlowSensorInfo {
  // Current flow rate in milliliters per minute (scaled by 100 for 2 decimal precision)
  // e.g. 12345 = 123.45 ml/min
  uint32 flow_rate_ml_min_x100 = 1;
  // Total volume measured in milliliters
  uint32 total_volume_ml = 2;
  // Raw pulse count from the sensor
  uint32 pulse_count = 3;
  // Sensor status
  SensorStatus status = 4;
  // Current state of the flow sensor
  SensorState state = 5;
}