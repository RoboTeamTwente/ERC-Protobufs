syntax = "proto3";

// Type of detected object
enum DetectedObjectType {
    OBJECT_UNKNOWN = 0;
    
    // Science Task (Probably not used for now since we don't do explicit CV for Science SUrface Sampling. But keep these here for now. Maybe we use them later)
    OBJECT_ROCK = 1;
    OBJECT_REGOLITH = 2;

    // Maintenance Task (The Maintenance Task WILL use CV.)
    OBJECT_MAIN_SWITCH = 3;
    OBJECT_BUTTON = 4;
    OBJECT_SWITCH = 5;
    OBJECT_ROTARY_SWITCH = 6;
    OBJECT_SOCKET = 7;
    OBJECT_ELECTROMAGNET = 8;
    OBJECT_PLATE = 9;
    OBJECT_CABLE = 10;
}

message BoundingBox {
    uint32 x = 1; // topleft x coordinate
    uint32 y = 2; // topleft y coordinate
    uint32 width = 3; // width of the bounding box
    uint32 height = 4; // height of the bounding box
}

// A single YOLO Detection
message DetectedObject {
    uint32 id = 1; // Unique ID for the detected object in the frame
    DetectedObjectType type = 2; // Type of the detected object
    BoundingBox bbox = 3; // Bounding box of the detected object
    float confidence = 4; // Confidence score of the detection (0.0 - 1.0)
}

// ROS > BS: Full list of detections for the current frame
message BasestationDetectedObjects {
    repeated DetectedObject objects = 1; // List of detected objects in the current frame
}