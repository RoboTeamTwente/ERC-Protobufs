syntax = "proto3";

// Type of detected object
enum DetectedObjectType {
    OBJECT_UNKNOWN = 0;
    
    // Science Task (Probably not used for now since we don't do explicit CV for Science SUrface Sampling. But keep these here for now. Maybe we use them later)
    OBJECT_ROCK = 1;
    OBJECT_REGOLITH = 2;

    // Maintenance Task (The Maintenance Task WILL use CV.)
    OBJECT_MAIN_SWITCH = 3;
    OBJECT_BUTTON = 4;
    OBJECT_SWITCH = 5;
    OBJECT_ROTARY_SWITCH = 6;
    OBJECT_SOCKET = 7;
    OBJECT_ELECTROMAGNET = 8;
    OBJECT_PLATE = 9;
    OBJECT_CABLE = 10;
}

message BoundingBox {
    uint32 x      = 1;
    uint32 y      = 2;
    uint32 width  = 3;
    uint32 height = 4;
}

// ROS->BS: One detected object per message
// Basestation reconstructs the full frame using frame_id + total_count + index
// Basestation will press one button to command Johnny Boy to take a picture of the current camera stream.
// Johnny Boi will perform object detection and pose estimation on the image, and send back a stream of BasestationDetectedObject messages, one for each detected object in the image.
message BasestationDetectedObject {
    uint32             frame_id    = 1; // identifies which frame this belongs to
    uint32             total_count = 2; // how many objects in this frame total
    uint32             index       = 3; // index of this object (0 to total_count-1)
    uint32             id          = 4; // unique tracker ID for this object
    DetectedObjectType type        = 5;
    BoundingBox        bbox        = 6;
    float              confidence  = 7;
}