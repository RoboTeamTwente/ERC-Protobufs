syntax = "proto3";

// Subsystem controlled by the operator
enum ActiveSubsystem {
    SUBSYSTEM_DRIVING = 0;
    SUBSYSTEM_ARM = 1;
    SUBSYSTEM_GRIPPER = 2;
}

// Control mode for a given subsystem
enum ControlMode {
    MODE_MANUAL = 0; // Operator directly controls the subsystem
    MODE_AUTO = 1; // Subsystem operates autonomously (business logic)
}

// BS->ROS: Operator mode selection for the rover
message BasestationControlMode {
    ActiveSubsystem active_subsystem = 1; // Which subsystem is currently active
    ControlMode driving_mode =2; // Auto/Manual for driving
    ControlMode arm_mode =3;
    ControlMode gripper_mode = 4; // Auto/Manual for gripper
}