syntax = "proto3";

// The entire rover (driving + arm + gripper) can be moved with one controller scheme.
// No need to specify control modes for individual subsystems.
// Just select either manual or autonomous mode.

// Control mode for a given subsystem
enum ControlMode {
    MODE_MANUAL = 0; // Operator directly controls the subsystem
    MODE_AUTO = 1; // Subsystem operates autonomously (business logic)
}

// BS->ROS: Operator mode selection for the rover
message BasestationControlMode {
    ControlMode mode = 1; // Desired control mode for the rover
}