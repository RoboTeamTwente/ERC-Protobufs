syntax = "proto3";

// Import board-specific message type definitions
import "message_types.proto"; // Imports from arm_board, driving_board, sensorboard

// Board Identifier Codes (for reference and routing)
enum BoardId {
  BOARD_RESERVED = 0x00;
  BOARD_ARM = 0x01;
  BOARD_DEBUGGING = 0x02;
  BOARD_DRIVING = 0x03;
  BOARD_SENSOR = 0x04;
  BOARD_SURFACE_SAMPLER = 0x05;
}

// System-level Message Types (0x00XX range)
enum SystemMessageType {
  MSG_UNKNOWN = 0x0000;
  MSG_BROADCAST_SENDING_TYPES = 0x0001; // Handshake: What a node sends
  MSG_BROADCAST_RECEIVING_TYPES = 0x0002; // Handshake: What a node receives
}

// ---------  ENVELOPE MESSAGE ----------

// Universal message wrapper for all board communications
message PBMessageEnvelope {
    // Message type identifies both the source board and specific message
    // Format: 0xBBMM where BB = board_id, MM = message_id
    // Use SystemMessageType, ArmBoardMessageType, DrivingBoardMessageType, or SensorBoardMessageType enums
    int32 message_type = 1;
    
    // Serialized protobuf message data (dynamically sized)
    // Contains the actual board-specific message bytes
    bytes data = 2;
}

// ---------  HANDSHAKE MESSAGES ----------

// Used to identify all messages this node can send
// Sent using MSG_BROADCAST_SENDING_TYPES (SystemMessageType)
message PBBroadcastSendingTypes {
  // Array of message type enum values (as int32) from board-specific enums
  // Can include: SystemMessageType, ArmBoardMessageType, DrivingBoardMessageType, SensorBoardMessageType
  repeated int32 message_types = 1;
}

// Used to identify all messages this node can receive
// Sent using MSG_BROADCAST_RECEIVING_TYPES (SystemMessageType)
message PBBroadcastingReceivingTypes {
  // Array of message type enum values (as int32) from board-specific enums
  // Can include: SystemMessageType, ArmBoardMessageType, DrivingBoardMessageType, SensorBoardMessageType
  repeated int32 message_types = 1;
}