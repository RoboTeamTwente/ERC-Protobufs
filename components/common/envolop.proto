syntax = "proto3";

// Board Identifier Codes (8 bits - first byte of identifier)
enum BoardId {
  RESERVED = 0x00; //00 is reserved cause if there is an error in the identifier
  ARM_BOARD = 0x01;
  DEBUGGING_BOARD = 0x02;
  DRIVING_BOARD = 0x03;
  SENSOR_BOARD = 0x04;
  SURFACE_SAMPLER_BOARD = 0x05; // yet to be created
  // if more boards are added, one can put them here. (remember the max identifier is 0xFF(which means we can have a max of 255 boards, low-key make a rocket and few drones attached to the rover in the future))
}

// ---------  ENVELOPE MESSAGE ----------

// Used to wrap a message 
message PBMessageEnvelope {
    // identifier format:
    // |--------|---------------------------|
    // |board_id|   message_identifier      |
    // | 8 bits |   24 bits (3 bytes)       | 
    // |--------|---------------------------|
    // Reserved Identifiers: 0xXX0000: sending types (see below)
    // Reserved Identifiers: 0xXX0001: receiving types (see below)
    // Reserved Identifiers: 0xXX0002: diagnostics
    // The 'data' field in PBMessageEnvelope contains the serialized board-specific message
    int32 identifier = 1;
    bytes data = 2;
}

// ---------  HANDSHAKE MESSAGES ----------

// Used to identify all messages this node can send
message PBBroadcastSendingTypes {
  // Identifiers: all others are 3byte long identifiers (length has to be 3*x)
  bytes identifiers = 1;
}

// Used to identify all messages this node can receive
message PBBroadcastingReceivingTypes {
  // Identifiers: others are 4byte long identifiers including sender id and message id (length has to be 4*x)
  bytes identifiers = 1;
}

