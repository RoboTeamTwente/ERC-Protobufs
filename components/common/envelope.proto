syntax = "proto3";



import "components/sensor_board/ph_sensor.proto";
import "components/sensor_board/imu_sensor.proto";
import "components/sensor_board/gps_sensor.proto";
import "components/sensor_board/diagnostics.proto";
import "components/arm_board/control_signals.proto";
import "components/arm_board/motor_diagnostics.proto";
import "components/arm_board/movement_feedback.proto";
import "components/arm_board/movement_in.proto";
import "components/driving_board/motor_diagnostics.proto";
import "components/driving_board/motor_msg.proto";
import "components/driving_board/motor_periodic_progress.proto";
import "components/sensor_board/load_cell.proto";
import "components/sensor_board/pressure_sensor.proto";

import "components/basestation/control_mode.proto";
import "components/basestation/detected_objects.proto";
import "components/basestation/mission_command.proto";
import "components/basestation/rock_measure_request.proto";
import "components/basestation/rock_measure_result.proto";
import "components/basestation/rover_localization.proto";
// All PBEnvelopes send need to have trailing 0 bytes *removed*
// before sending. This is to decrease network traffic
// That means that when you get a PBEnvelope you need to pad it to the PBEnvelope Size

message PBEnvelope {
  oneof payload {
    SensorBoardPHInfo ph_info = 1;
    ArmBoardControlSignals arm_ctrl = 2;
    ArmBoardDiagnostics arm_diag = 3;
    ArmBoardMovementFeedback arm_feedback = 4;
    ArmBoardActualPositions arm_pos = 5;
    ArmBoardTargetMovement arm_target = 6;
    ArmBoardObstructions arm_obstructions = 7;
    DrivingBoardDiagnostics drive_diag = 8;
    DrivingBoardMotorMessage drive_motor = 9;
    DrivingBoardMotorPeriodicProgress drive_progress = 10;
    SensorBoardDiagnostics sensor_diag = 11;
    SensorBoardGPSInfo gps_info = 12;
    SensorBoardIMUInfo   imu_info = 13;
    SensorBoardLoadCellInfo load_cell_info = 14;
    SensorBoardPressureInfo pressure_info = 15;

    // Basestation messages
    BasestationControlMode control_mode = 16;
    BasestationDetectedObjects detected_objects = 17;
    BasestationMissionCommand mission_command = 18;
    BasestationObjectSelection object_selection = 19;
    BasestationRockMeasureRequest rock_measure_request = 20;
    BasestationRockMeasureResult rock_measure_result = 21;
    BasestationRoverLocalization rover_localization = 22;
  }
}
