syntax = "proto3";

//sensorboard imports
import "components/sensor_board/ph_sensor.proto";
import "components/sensor_board/imu_sensor.proto";
import "components/sensor_board/gps_sensor.proto";
import "components/sensor_board/diagnostics.proto";
import "components/sensor_board/flow_sensor.proto";
import "components/sensor_board/pump.proto";

//armboard imports
import "components/arm_board/movement_control_in.proto";
import "components/arm_board/motor_diagnostics.proto";
import "components/arm_board/movement_software_feedback.proto";
import "components/arm_board/movement_software_target.proto";

//drivingboard imports
import "components/driving_board/motor_diagnostics.proto";
import "components/driving_board/motor_msg.proto";
import "components/driving_board/motor_periodic_progress.proto";
import "components/sensor_board/load_cell.proto";
import "components/sensor_board/pressure_sensor.proto";

//basestation imports
import "components/basestation/control_mode.proto";
import "components/basestation/detected_object.proto";
import "components/basestation/object_selection.proto";
import "components/basestation/rock_measure_request.proto";
import "components/basestation/rock_measure_result.proto";
import "components/basestation/rover_localization.proto";
import "components/basestation/manual_drive.proto";
import "components/basestation/manual_brake.proto";
import "components/basestation/manual_arm_velocity.proto";
import "components/basestation/manual_arm_flick.proto";
import "components/basestation/manual_arm_rotate.proto";
import "components/basestation/manual_gripper_control.proto";

// All PBEnvelopes send need to have trailing 0 bytes *removed*
// before sending. This is to decrease network traffic
// That means that when you get a PBEnvelope you need to pad it to the PBEnvelope Size

message PBEnvelope {
  oneof payload {

    //Armboard messages
    ArmBoardControlSignals arm_ctrl = 2;
    ArmBoardDiagnostics arm_diag = 3;
    ArmBoardMovementFeedback arm_feedback = 4;
    ArmBoardActualPositions arm_pos = 5;
    ArmBoardTargetMovement arm_target = 6;
    ArmBoardObstructions arm_obstructions = 7;

    //Drivingboard messages
    DrivingBoardDiagnostics drive_diag = 8;
    DrivingBoardMotorMessage drive_motor = 9;
    DrivingBoardMotorPeriodicProgress drive_progress = 10;

    //Sensorboard messages
    SensorBoardPHInfo ph_info = 1;
    SensorBoardDiagnostics sensor_diag = 11;
    SensorBoardGPSInfo gps_info = 12;
    SensorBoardIMUInfo   imu_info = 13;
    SensorBoardLoadCellInfo load_cell_info = 14;
    SensorBoardPressureInfo pressure_info = 15;

    // New sensor board messages
    SensorBoardFlowSensorInfo flow_sensor_info = 22;
    SensorBoardPumpInfo pump_info = 23;

    // Basestation messages
    BasestationControlMode control_mode = 16;
    BasestationDetectedObject detected_object = 17;
    BasestationObjectSelection object_selection = 18;
    BasestationRockMeasureRequest rock_measure_request = 19;
    BasestationRockMeasureResult rock_measure_result = 20;
    BasestationRoverLocalization rover_localization = 21;

    // Basestation manual control messages
    // Driving
    BasestationManualDrive manual_drive = 24;
    BasestationManualBrake manual_brake = 25;
    // Arm
    BasestationManualArmVelocity manual_arm_velocity = 26;
    BasestationManualArmFlick manual_arm_flick = 27;
    BasestationManualArmRotate manual_arm_rotate = 28;
    // Gripper
    BasestationManualGripperControl manual_gripper_control = 29;
  }

  uint32 timeout = 30; // timeout for certain messages (driving, arm, beacon, basestation or jetson)
  // timeout will be 0 for messages that don't need it (like diagnostics)
  // engage BRAKES after timeout
}
