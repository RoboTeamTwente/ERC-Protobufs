syntax = "proto3";
// used to wrap a message 
message PBMessageEnvelope {
    // identifier format:
    // |--------|---------------------------|
    // |board_id|   message_identifier      |
    // | 8 bits |   27 bits (3 bytes)       |
    // |--------|---------------------------|
    // Reserved Identifiers: 0xXX0000: sending types (see below)
    // Reserved Identifiers: 0xXX0001: receiving types (see below)
    // Reserved Identifiers: 0xXX0002: diagnostics
    int32 identifier = 1;
    bytes data = 2;
}

// ---------  HANDSHAKE MESSAGES ----------

// Used to identify all messages this node can send
message PBBroadcastSendingTypes {
// Identifiers: all others are 3byte long identifiers (lenght has to be 3*x)
  bytes identifiers = 1;
}

// Used to identify all messages this node can receive
message PBBroadcastingReceivingTypes {
  // Identifiers: others are 4byte long identifiers including sender id and message id (length has to be 4*x)
  bytes identifiers = 1;
}
message DrivingBoardMotorPeriodicProgress {
  float distance_left = 1;
}message DrivingBoardMotorInformation {
  float motor_id = 1;
  float current = 2;
  float rpm = 3;
  float back_emf = 4;
  }message DrivingBoardMotorDistanceReachedNotification {
  float distance_reached = 1;
}message DrivingBoardDiagnostics {
  enum State {
      IDLE = 0;
      OPERATING = 1;
      ERROR = 2;
      }

  State state = 1;
    DrivingBoardMotorInformation motor_information1 = 2;
    DrivingBoardMotorInformation motor_information2 = 3;
    DrivingBoardMotorInformation motor_information3 = 4;
    DrivingBoardMotorInformation motor_information4 = 5;
    DrivingBoardMotorInformation motor_information5 = 6;
    DrivingBoardMotorInformation motor_information6 = 7;
    DrivingBoardMotorInformation motor_information7 = 8;
    DrivingBoardMotorInformation motor_information8 = 9;
    DrivingBoardMotorInformation motor_information9 = 10;
    DrivingBoardMotorInformation motor_information10 = 11;
}
message DrivingBoardMotorMsg {
  float distance_to_go = 1;
  float turning_angle = 2;
  float turning_radius = 3;
}